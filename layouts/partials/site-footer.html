<style>
/* Footer text styling for light/dark mode */
.footer-text {
  color: #333 !important; /* Dark text for light mode */
}

.footer-link {
  color: #333 !important; /* Dark text for light mode */
  text-decoration: underline !important;
}

.footer-social-icon {
  width: 22px;
  height: 22px;
  fill: #333;
}

/* Dark mode override */
@media (prefers-color-scheme: dark) {
  .footer-text, .footer-link {
    color: rgba(255, 255, 255, 0.7) !important; /* white-70 equivalent */
  }
  .footer-social-icon {
    fill: rgba(255, 255, 255, 0.7);
  }
}
</style>

<script>
(function() {
  var toArabic = function(str) {
    return str.replace(/[0-9]/g, function(d) {
      return '٠١٢٣٤٥٦٧٨٩'[d];
    });
  };

  var formatDate = function(str) {
    // Reformat YYYY-MM-DD to YYYY/MM/DD (RTL order), strip leading zeros
    return toArabic(str.replace(/(\d{4})-(\d{2})-(\d{2})/g, function(_, y, m, d) {
      return y + '/' + parseInt(m, 10) + '/' + parseInt(d, 10);
    }));
  };

  document.addEventListener('DOMContentLoaded', function() {
    // Convert and reformat dates in <time> elements
    document.querySelectorAll('time').forEach(function(el) {
      el.textContent = formatDate(el.textContent);
    });
    // Convert category counts in .categories-list links
    document.querySelectorAll('.categories-list a').forEach(function(el) {
      el.textContent = toArabic(el.textContent);
    });
    // Convert counts in .chip-count spans (categories cloud on homepage)
    document.querySelectorAll('.chip-count').forEach(function(el) {
      el.textContent = toArabic(el.textContent);
    });
    // Convert counts in .tag-link anchors (tags cloud on homepage)
    document.querySelectorAll('.tag-link').forEach(function(el) {
      el.textContent = toArabic(el.textContent);
    });
  });
})();
</script>
