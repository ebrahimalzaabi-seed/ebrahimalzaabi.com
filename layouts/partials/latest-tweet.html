<!-- Latest Tweet Widget -->
<section id="tweet-widget" class="tweet-widget pa3 pa4-ns mt4" style="display:none;">
  <div class="tc mb3">
    <svg class="tweet-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-label="X logo" role="img">
      <path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z" />
    </svg>
  </div>
  <div class="tweet-card pa3">
    <div id="tweet-profile" class="tweet-profile flex items-center mb3"></div>
    <blockquote id="tweet-text" class="lh-copy arabic-text f4 mb3"></blockquote>
    <div class="tc mt3">
      <a id="tweet-date-link" href="#" target="_blank" rel="noopener noreferrer" class="db mb2 link dim f6 f5-ns gray"></a>
    </div>
  </div>
  <div class="tc mt3">
    <a href="https://x.com/ebrahimuae1" target="_blank" rel="noopener noreferrer" class="tweet-btn inline-flex items-center pv2 ph3 br-pill f6 f5-ns">
      <svg class="tweet-btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-label="X logo" role="img"><path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z"/></svg>
      <span class="tweet-btn-text arabic-text">المزيد</span>
    </a>
  </div>
</section>

<script>
(function() {
  var endpoint = {{ if hugo.IsProduction }}"https://embeded-tweet.ebrahimalzaabi-seed.workers.dev"{{ else }}"http://localhost:8787"{{ end }};
  fetch(endpoint)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var p = data.profile || {};
      var t = data.tweet || {};
      var profileEl = document.getElementById("tweet-profile");
      var html = "";
      if (p.imageUrl) html += '<img src="' + p.imageUrl + '" alt="' + (p.name || "") + '" class="tweet-profile-img br-100 mr3" loading="lazy"/>';
      html += '<div class="tweet-profile-text">';
      if (p.name) html += '<span class="tweet-profile-name fw6">' + p.name + '</span><br/>';
      if (p.handle) html += '<span class="tweet-profile-handle gray f6">' + p.handle + '</span>';
      html += '</div>';
      profileEl.innerHTML = html;
      document.getElementById("tweet-text").textContent = t.text || "";
      var dateLink = document.getElementById("tweet-date-link");
      dateLink.href = t.url || "#";
      if (t.datetime) {
        var dateOnly = t.datetime.split("T")[0];
        dateLink.innerHTML = '<time datetime="' + t.datetime + '">' + dateOnly + '</time>';
      }
      document.getElementById("tweet-widget").style.display = "";
    })
    .catch(function(err) {
      console.error("Tweet fetch error:", err);
    });
})();
</script>

<style>
  /* Tweet widget custom styling */
  .tweet-widget {
    background-color: #f8f8f8; /* match YouTube widget */
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 3rem;
  }
  .tweet-btn {
    text-decoration: none;
    background-color: #f0f0f0;
    color: #333;
    border: 2px solid transparent;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  .tweet-btn:hover {
    background-color: #000000;
    color: #ffffff;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }
  .tweet-icon {
    width: 32px;
    height: 32px;
    fill: currentColor;
    color: #000000;
  }
  .tweet-btn-icon {
    width: 1.4em;
    height: 1.1em;
    fill: currentColor;
    margin-right: 0.5rem; /* since RTL, icon appears then text */
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  .tweet-card {
    background: #ffffff;
    border-radius: 8px;
    padding: 1.5rem;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }
  .tweet-profile-img {
    width: 48px;
    height: 48px;
  }
  .tweet-profile {
    gap: 0.75rem; /* space between avatar and text */
  }
  .tweet-profile-name {
    font-size: 1rem;
  }
  .tweet-profile-handle {
    font-size: 0.9rem;
    margin-top: 0.25rem;
  }
  .tweet-json-dump {
    direction:ltr;
    white-space: pre-wrap;
    word-break: break-all;
  }
  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    .tweet-widget {
      background-color: #2d2d2d;
      border-color: #444 !important;
    }
    .tweet-card {
      background: #333333;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
    }
    .tweet-btn {
      background-color: #444444;
      color: #f0f0f0;
    }
    .tweet-btn:hover {
      background-color: #000000;
      color: #ffffff;
    }
    .tweet-icon {
      color: #ffffff;
    }
  }
</style>
