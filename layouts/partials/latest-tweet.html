<!-- Latest Tweet Widget -->
<section id="tweet-widget" class="tweet-widget mt4" style="display:none;">
  <div class="tweet-section-header">
    <span class="tweet-section-badge">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="tweet-section-badge-icon" aria-hidden="true"><path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z"/></svg>
      <span class="arabic-text">تغريدات</span>
    </span>
  </div>
  <div class="tweet-card">
    <div class="tweet-card-header">
      <div id="tweet-profile" class="tweet-profile"></div>
      <a href="https://x.com/ebrahimuae1" target="_blank" rel="noopener noreferrer" class="tweet-icon-link link dim">
        <svg class="tweet-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-label="X logo" role="img">
          <path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z" />
        </svg>
      </a>
    </div>
    <blockquote id="tweet-text" class="tweet-text arabic-text"></blockquote>
  </div>
</section>

<script>
(function() {
  var endpoint = {{ if hugo.IsProduction }}"https://embeded-tweet.ebrahimalzaabi-seed.workers.dev"{{ else }}"http://localhost:8787"{{ end }};
  fetch(endpoint)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var p = data.profile || {};
      var t = data.tweet || {};
      var profileEl = document.getElementById("tweet-profile");
      var html = "";
      var profileLink = 'https://x.com/ebrahimuae1';
      if (p.imageUrl) html += '<a href="' + profileLink + '" target="_blank" rel="noopener noreferrer" class="tweet-avatar-link link dim"><img src="' + p.imageUrl + '" alt="' + (p.name || "") + '" class="tweet-profile-img" loading="lazy"/></a>';
      if (p.name) html += '<a href="' + profileLink + '" target="_blank" rel="noopener noreferrer" class="tweet-profile-name link dim">' + p.name + '</a>';
      if (p.handle) html += '<a href="' + profileLink + '" target="_blank" rel="noopener noreferrer" class="tweet-profile-handle link dim">' + p.handle + '</a>';
      if (t.datetime) {
        var dateOnly = t.datetime.split("T")[0];
        html += '<span class="tweet-meta-dot"> · </span>';
        html += '<a href="' + (t.url || "#") + '" target="_blank" rel="noopener noreferrer" class="tweet-date link dim">' + dateOnly + '</a>';
      }
      profileEl.innerHTML = html;
      document.getElementById("tweet-text").textContent = t.text || "";
      document.getElementById("tweet-widget").style.display = "";
    })
    .catch(function(err) {
      console.error("Tweet fetch error:", err);
    });
})();
</script>

<style>
  /* Tweet widget custom styling */
  .tweet-widget {
    margin-bottom: 2rem;
  }
  .tweet-section-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 0;
    border-bottom: 2px solid #eee;
    padding-bottom: 0;
  }
  .tweet-section-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background-color: #C5A059;
    color: white;
    padding: 0.6rem 1.25rem;
    border-radius: 8px 8px 0 0;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: -2px;
  }
  .tweet-section-badge-icon {
    width: 1.1em;
    height: 1.1em;
    fill: currentColor;
  }
  .tweet-card {
    background: #ffffff;
    border: 1px solid #e1e8ed;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    transition: box-shadow 0.2s ease;
  }
  .tweet-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .tweet-card-header {
    display: flex;
    align-items: flex-start;

    margin-bottom: 0.5rem;
  }
  .tweet-icon {
    width: 22px;
    height: 22px;
    fill: currentColor;
    color: #000;
    flex-shrink: 0;
  }
  .tweet-profile {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .tweet-profile-img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
  }
  .tweet-profile-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: #0f1419;
    white-space: nowrap;
  }
  .tweet-profile-handle {
    font-size: 0.85rem;
    color: #536471;
    text-decoration: none;
    white-space: nowrap;
  }
  .tweet-meta-dot {
    color: #536471;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .tweet-date {
    font-size: 0.85rem;
    color: #536471;
    text-decoration: none;
    white-space: nowrap;
  }
  .tweet-icon-link {
    flex-shrink: 0;
  }
  .tweet-text {
    margin: 0;
    padding: 0;
    font-size: 1.15rem;
    line-height: 1.5;
    color: #0f1419;
    border: none;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    .tweet-card {
      background: #1a1a1a;
      border-color: #333;
    }
    .tweet-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .tweet-profile-name {
      color: #e7e9ea;
    }
    .tweet-profile-handle {
      color: #71767b;
    }
    .tweet-text {
      color: #e7e9ea;
    }
    .tweet-date {
      color: #71767b;
    }
    .tweet-meta-dot {
      color: #71767b;
    }
    .tweet-icon {
      color: #e7e9ea;
    }
  }
</style>
